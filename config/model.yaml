lightgbm:
  objective: binary
  n_estimators: 2000
  learning_rate: 0.01
  max_depth: 8
  num_leaves: 64
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 1.0
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1
  force_col_wise: true
  verbosity: -1
early_stopping_rounds: 100
walk_forward:
  train_bars: 12000
  val_bars: 2000
  test_bars: 2000
  step_bars: 2000
thresholds:
  long: 0.60
  short: 0.40
