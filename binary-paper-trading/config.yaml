symbol: BTC/USD:USD
model_path: outputs/models/lightgbm_model.pkl
logs_dir: binary-paper-trading/logs
timeframe: 15m
history_bars: 500
orderbook_limit: 50
decision_thresholds:
  long: 0.60
  short: 0.40
paper_account:
  initial_equity: 10000.0
  notional_fraction: 1.0
  fee_bps: 2.0
  slippage_bps: 1.0
loop:
  seconds_after_boundary: 10
  retry_attempts: 3
  retry_sleep_seconds: 5
